name: Build APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME}
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/memory-ai-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: memory.ai ${{ github.ref_name }}
          body: |
            ## Install

            1. Download `memory-ai-${{ github.ref_name }}.apk` below
            2. On Android: **Settings → Apps → Special app access → Install unknown apps** → allow your browser/Files app
            3. Open the APK and tap Install
            4. Launch memory.ai → Settings → add your API key → pick your Obsidian vault

            > **Note**: Google Sign-In won't work with this pre-built APK (identity-only, not required for AI features).

            ## What's new
            See [CHANGELOG](https://github.com/oneplusiota/memory-ai/commits/main) for details.
          files: android/app/build/outputs/apk/debug/memory-ai-${{ github.ref_name }}.apk
